{% extends './layout.html' %}
{% block title %}{{data.page}}{% endblock %}

{% block body %}

<table id="table">
    
    {% for row in grid %}
    <tr>
        {% for cell in row %}
        <td>   
            {% if cell.revealed %}
                {% if cell.mine %}
                    #
                {% else %}
                    {{cell.number}}
                {% endif %}
            {% else %}
                ?
            {% endif %}
        </td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>
{% endblock %}
