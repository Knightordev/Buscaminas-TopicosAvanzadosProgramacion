{% extends './layout.html' %}
{% block title %}Top 10{% endblock %}

{% block body %}

<h2 style="color:white;">Top 10 Puntajes</h2>

<table>
    <tr>
        <th style="color:white;">Nombre</th>
        <th style="color:white;">Puntaje</th>
    </tr>

    {% for nombre, puntaje in puntajes %}
    <tr>
        <td>{{ nombre }}</td>
        <td>{{ puntaje }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/" style="color:#00ff88;">Volver al juego</a>

{% endblock %}
